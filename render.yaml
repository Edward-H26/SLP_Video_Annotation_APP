services:
  - type: web
    name: video-annotation-app
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --timeout 600 --bind 0.0.0.0:$PORT
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: UPLOAD_DIR
        value: /tmp/data
      - key: TRANSCRIPTION_MODEL
        value: gpt-4o-transcribe-diarize
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: NODE_VERSION
        value: 20.11.0
